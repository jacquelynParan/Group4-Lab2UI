<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock-in / Clock-out Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Employee Attendance Dashboard</h1>
    </header>

    <div class="clock-buttons">
        <button id="clockIn" aria-label="Clock In">Clock In</button>
        <button id="clockOut" aria-label="Clock Out">Clock Out</button>
    </div>

    <ul class="dashboard" role="list">
        <li class="card" role="listitem">
            <h2>Today's Attendance</h2>
            <p>Number of employees present today: 12</p>
        </li>
        <li class="card" role="listitem">
            <h2>Employees Present</h2>
            <p>Currently clocked in: 10</p>
        </li>
        <li class="card" role="listitem">
            <h2>Employees Absent</h2>
            <p>Currently absent: 5</p>
        </li>
        <li class="card" role="listitem">
            <h2>Late Employees</h2>
            <p>Clocked in late: 2</p>
        </li>
    </ul>
</body>
</html>
